packages:
  - 'core/*'
  - 'shared'
  - 'plugins-sdk'
  - 'app'

# Don't re-run `pnpm install` before `pnpm run` scripts: the install's
# ignored-build-script warning otherwise returns exit 1 and blocks `pnpm -r test`.
verifyDepsBeforeRun: false

# Approve native build scripts (esbuild platform binary, electron runtime,
# better-sqlite3 native addon for FTS5).
onlyBuiltDependencies:
  - esbuild
  - electron
  - better-sqlite3
