packages:
  - 'core/*'
  - 'shared'
  - 'plugins-sdk'
  - 'app'

# Don't re-run `pnpm install` before `pnpm run` scripts: the install's
# ignored-build-script warning otherwise returns exit 1 and blocks `pnpm -r test`.
verifyDepsBeforeRun: false

# Approve native build scripts. esbuild's native binary is already present via its
# platform package; electron downloads its runtime binary.
allowBuilds:
  electron: true
  esbuild: true
onlyBuiltDependencies:
  - esbuild
  - electron
