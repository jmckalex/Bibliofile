# Packaging config for Bibliofile (electron-builder).
#
# Two-package.json layout: the dev deps + this config live at the repo root; the
# Electron app (its `main`, version, and runtime deps) is `app/`. electron-vite
# bundles the renderer/preload/main, externalising ONLY the native `better-sqlite3`
# — so the packaged app is `app/out/**` plus that one native module (asar-unpacked).
#
# Native rebuild for the Electron ABI is done by `scripts/rebuild-native.mjs
# electron` before packaging (see the root `pack`/`dist` scripts), so npmRebuild is
# off here.
#
# Signing: macOS builds are signed with the Developer ID Application cert
# auto-discovered from the login keychain (no `identity` field) and then notarized
# + stapled by the afterSign hook below. Set CSC_IDENTITY_AUTO_DISCOVERY=false to
# force an unsigned build (the `pack:dir` dev script does this); the afterSign hook
# self-skips when the APPLE_* env vars are absent.
appId: com.jmckalex.bibliofile
productName: Bibliofile
copyright: © 2026 J. McKenzie Alexander
# Pinned because electron-builder can't auto-detect Electron through pnpm's
# symlinked layout with `directories.app`. Keep in sync with app's electron devDep.
electronVersion: 33.4.11

directories:
  app: app # the Electron application directory (app/package.json)
  output: release # built installers land in ./release (repo root)
  buildResources: build # icons + entitlements live in ./build (repo root)

# Relative to the app dir (app/). The whole app is bundled into out/**; the only
# runtime node_modules dependency is the native better-sqlite3 (+ its deps), which
# electron-builder collects automatically from the production dependency tree.
files:
  - out/**/*
  - package.json

# Native .node binaries can't live inside the asar archive.
asarUnpack:
  - '**/*.node'

npmRebuild: false # we rebuild better-sqlite3 for Electron ourselves (see scripts)

# Notarize + staple the signed .app (skips itself without APPLE_* env vars).
afterSign: scripts/notarize.cjs

mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false # we notarize separately via the afterSign hook
  # electron-builder's own notarize step is off; our afterSign hook handles it so
  # we control bundle id + stapling. With no `identity` set, electron-builder
  # auto-discovers the "Developer ID Application" cert from the login keychain.
  notarize: false

win:
  target:
    - nsis

linux:
  target:
    - AppImage
    - deb
  category: Office
